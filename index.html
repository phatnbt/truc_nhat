<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lịch trực nhật</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-soft: #eff6ff;
      --green: #16a34a;
      --green-soft: #ecfdf5;
      --red: #dc2626;
      --red-soft: #fef2f2;
      --amber: #d97706;
      --amber-soft: #fffbeb;
      --purple-soft: #f5f3ff;
      --purple: #7c3aed;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.13), transparent 32%),
        radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.11), transparent 32%),
        var(--bg);
      color: var(--text);
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .logo {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: white;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      font-size: 22px;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.28);
    }

    h1 {
      margin: 0;
      font-size: 25px;
      letter-spacing: -0.6px;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      min-width: 96px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 20px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
      align-items: start;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .card-head h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.35px;
    }

    .card-body {
      padding: 18px 20px 20px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row > * { flex: 1; }

    input, select, button {
      font: inherit;
    }

    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 13px;
      outline: none;
      color: var(--text);
      background: white;
      transition: 0.16s;
    }

    input:focus, select:focus {
      border-color: rgba(37, 99, 235, 0.55);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.09);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
      transition: 0.16s;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    button:active { transform: translateY(1px); }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
    }

    .btn-blue {
      color: #1d4ed8;
      background: var(--primary-soft);
    }

    .btn-green {
      color: #15803d;
      background: var(--green-soft);
    }

    .btn-red {
      color: #b91c1c;
      background: var(--red-soft);
    }

    .btn-amber {
      color: #92400e;
      background: var(--amber-soft);
    }

    .btn-purple {
      color: var(--purple);
      background: var(--purple-soft);
    }

    .member-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .member {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 11px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
    }

    .member strong {
      display: block;
      font-size: 15px;
    }

    .member small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .member button {
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    .switch {
      position: relative;
      width: 46px;
      height: 26px;
      flex: unset;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(22, 163, 74, 0.22);
      border: 1px solid rgba(22, 163, 74, 0.3);
      cursor: pointer;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 2px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.18);
      transition: 0.18s;
    }

    .switch input:not(:checked) + .slider {
      background: rgba(220, 38, 38, 0.14);
      border-color: rgba(220, 38, 38, 0.2);
    }

    .switch input:not(:checked) + .slider::before {
      transform: translateX(19px);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .toolbar button,
    .toolbar input {
      flex: unset;
    }

    .week-tools {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .mini-help {
      margin: -4px 0 14px;
      color: var(--muted);
      font-size: 12px;
    }

    .schedule {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      overflow: hidden;
    }

    .schedule-title {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      background: linear-gradient(135deg, #ffffff, #f8fafc);
    }

    .schedule-title h3 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.4px;
    }

    .schedule-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .schedule-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      color: #1d4ed8;
      background: var(--primary-soft);
      font-size: 12px;
      font-weight: 850;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 15px 20px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    tr:last-child td { border-bottom: 0; }

    th {
      color: var(--muted);
      background: #f8fafc;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    td:nth-child(2) { font-weight: 900; }

    .note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.45;
    }

    .cut td:nth-child(2) { color: var(--red); }

    .empty {
      padding: 24px;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
      background: #fff;
    }

    details {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: white;
      overflow: hidden;
    }

    details + details { margin-top: 10px; }

    summary {
      cursor: pointer;
      list-style: none;
      padding: 15px 16px;
      font-weight: 900;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    summary::-webkit-details-marker { display: none; }

    .manual-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .manual-item {
      display: grid;
      gap: 7px;
    }

    .manual-item label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .ai-panel {
      margin-top: 18px;
      border: 1px solid #ddd6fe;
      background: linear-gradient(135deg, #ffffff, #faf5ff);
    }

    .ai-head {
      padding: 15px 16px;
      border-bottom: 1px solid #ede9fe;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .ai-head strong {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
    }

    .ai-body {
      padding: 14px;
    }

    .ai-messages {
      height: 220px;
      overflow: auto;
      display: grid;
      gap: 10px;
      padding-right: 4px;
    }

    .msg {
      max-width: 88%;
      padding: 10px 12px;
      border-radius: 15px;
      font-size: 13px;
      line-height: 1.48;
      white-space: pre-wrap;
    }

    .msg.bot {
      background: white;
      border: 1px solid #ede9fe;
      color: #312e81;
      justify-self: start;
    }

    .msg.user {
      background: #2563eb;
      color: white;
      justify-self: end;
    }

    .quick-ai {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0;
    }

    .quick-ai button {
      padding: 9px 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    .ai-input {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      padding: 12px 16px;
      border-radius: 999px;
      color: white;
      background: rgba(15, 23, 42, 0.94);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.22);
      font-weight: 800;
      transition: 0.2s;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .section { margin-top: 18px; }

    .compact-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    @media (max-width: 980px) {
      .topbar, .layout { grid-template-columns: 1fr; }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .stats { justify-content: flex-start; }

      .layout { display: grid; }
    }

    @media (max-width: 680px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 14px;
      }

      .topbar, .card-body, .card-head {
        padding: 15px;
      }

      .week-tools, .manual-grid, .ai-input {
        grid-template-columns: 1fr;
      }

      .member {
        grid-template-columns: auto 1fr;
      }

      .member button { grid-column: 1 / -1; }

      th, td { padding: 13px 12px; }

      .schedule-title {
        flex-direction: column;
      }

      .schedule-actions {
        justify-content: flex-start;
      }

      .msg { max-width: 96%; }
    }

    @media print {
      body { background: white; }

      .topbar,
      .sidebar,
      .controls,
      .manual-section,
      .history-section,
      .data-section,
      .ai-panel {
        display: none !important;
      }

      .app {
        width: 100%;
        padding: 0;
      }

      .layout { display: block; }

      .card, .schedule {
        border: 0;
        box-shadow: none;
        border-radius: 0;
      }

      .card-body { padding: 0; }

      .schedule-actions { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🧹</div>
        <div>
          <h1>Lịch trực nhật</h1>
          <p>Xoay tua theo tuần · có trợ lý gợi ý · có xử lý người vắng</p>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <strong id="totalMembers">0</strong>
          <span>Thành viên</span>
        </div>
        <div class="stat">
          <strong id="presentMembers">0</strong>
          <span>Có mặt</span>
        </div>
        <div class="stat">
          <strong id="totalSchedules">0</strong>
          <span>Tuần</span>
        </div>
      </div>
    </header>

    <section class="layout">
      <aside class="card sidebar">
        <div class="card-head">
          <h2>Thành viên</h2>
          <button class="btn-blue" id="markAllPresentBtn">Có mặt hết</button>
        </div>

        <div class="card-body">
          <div class="row">
            <input id="memberName" type="text" placeholder="Tên thành viên" autocomplete="off" />
            <button class="btn-primary" id="addMemberBtn">Thêm</button>
          </div>

          <div id="memberList" class="member-list"></div>

          <div class="toolbar">
            <button class="btn-amber" id="markAllAbsentBtn">Vắng hết</button>
          </div>

          <details class="section data-section">
            <summary>
              <span>Dữ liệu</span>
              <span>⌄</span>
            </summary>
            <div class="card-body" style="padding-top: 0;">
              <div class="toolbar">
                <button class="btn-blue" id="exportDataBtn">Xuất dữ liệu</button>
                <button class="btn-green" id="importDataBtn">Nhập dữ liệu</button>
                <button class="btn-red" id="clearBtn">Xóa hết</button>
                <input type="file" id="importFile" accept="application/json" hidden />
              </div>
            </div>
          </details>
        </div>
      </aside>

      <section class="card">
        <div class="card-head controls">
          <h2>Phân công tuần</h2>
          <div class="compact-actions">
            <button class="btn-blue" id="copyBtn">Copy lịch</button>
            <button class="btn-blue" id="exportTxtBtn">TXT</button>
            <button class="btn-green" id="exportPdfBtn">PDF</button>
          </div>
        </div>

        <div class="card-body">
          <div class="week-tools controls">
            <input id="weekStart" type="date" />
            <button class="btn-blue" id="nextWeekBtn" title="Tự chọn thứ Hai của tuần kế tiếp">Chọn tuần sau</button>
            <button class="btn-primary" id="generateBtn">Tạo lịch</button>
          </div>
          <div class="mini-help controls">
            “Chọn tuần sau” chỉ tự điền ngày bắt đầu của tuần kế tiếp để tạo lịch nhanh hơn.
          </div>

          <div class="toolbar controls">
            <button class="btn-green" id="saveManualBtn">Lưu chỉnh tay</button>
            <button class="btn-red" id="deleteCurrentBtn">Xóa tuần này</button>
          </div>

          <div id="currentSchedule"></div>

          <section class="ai-panel schedule">
            <div class="ai-head">
              <strong>🤖 Trợ lý trực nhật</strong>
              <button class="btn-purple" id="aiAnalyzeBtn">Gợi ý nhanh</button>
            </div>
            <div class="ai-body">
              <div id="aiMessages" class="ai-messages"></div>
              <div class="quick-ai">
                <button class="btn-purple" data-ai="Gợi ý lịch tuần này">Gợi ý lịch</button>
                <button class="btn-purple" data-ai="Phân tích công bằng">Công bằng?</button>
                <button class="btn-purple" data-ai="Gợi ý đổi người">Đổi người?</button>
                <button class="btn-purple" data-ai="Nếu thiếu người thì chia thế nào">Thiếu người?</button>
                <button class="btn-purple" data-ai="Ưu tiên công việc nào">Ưu tiên việc</button>
                <button class="btn-purple" data-ai="Vì sao chia như vậy">Vì sao?</button>
                <button class="btn-purple" data-ai="Tuần sau dùng để làm gì">Tuần sau?</button>
              </div>
              <div class="ai-input">
                <input id="aiInput" type="text" placeholder="Hỏi trợ lý: thiếu 2 người chia sao, nên cắt việc nào..." />
                <button class="btn-primary" id="aiSendBtn">Gửi</button>
              </div>
            </div>
          </section>

          <details class="section manual-section">
            <summary>
              <span>Chỉnh tay phân công</span>
              <span>⌄</span>
            </summary>
            <div class="card-body" style="padding-top: 0;">
              <div id="manualEditor" class="manual-grid"></div>
            </div>
          </details>

          <details class="section history-section">
            <summary>
              <span>Lịch sử</span>
              <span>⌄</span>
            </summary>
            <div class="card-body" style="padding-top: 0;">
              <div id="history"></div>
            </div>
          </details>
        </div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const TASKS = [
      "Lavabo - Toilet",
      "Sàn nvs - cống",
      "Quét Nhà",
      "Lau Nhà",
      "Giặt thảm",
      "Vứt rác, bình nước"
    ];

    const CUT_PRIORITY = ["Vứt rác, bình nước", "Giặt thảm"];
    const STORAGE_KEY = "rotating_cleaning_schedule_v5";
    const OLD_KEYS = [
      "rotating_cleaning_schedule_v4",
      "rotating_cleaning_schedule_v3",
      "rotating_cleaning_schedule_v2",
      "weekly_cleaning_assigner_v1"
    ];
    const CUT_VALUE = "__CUT__";
    const $ = selector => document.querySelector(selector);

    let state = loadState();
    let selectedScheduleId = null;
    let attendance = {};

    initAttendanceFromMembers();

    function loadState() {
      try {
        let raw = localStorage.getItem(STORAGE_KEY);

        if (!raw) {
          for (const key of OLD_KEYS) {
            raw = localStorage.getItem(key);
            if (raw) break;
          }
        }

        if (!raw) return { members: [], schedules: [] };

        const parsed = JSON.parse(raw);
        return {
          members: Array.isArray(parsed.members) ? parsed.members : [],
          schedules: Array.isArray(parsed.schedules) ? parsed.schedules : []
        };
      } catch {
        return { members: [], schedules: [] };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render();
    }

    function initAttendanceFromMembers() {
      state.members.forEach(member => {
        if (attendance[member.id] === undefined) attendance[member.id] = true;
      });
    }

    function makeId() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function toLocalDateInputValue(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function parseDate(value) {
      const [y, m, d] = value.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function addDays(date, days) {
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return result;
    }

    function getNextMonday(from = new Date()) {
      const result = new Date(from);
      result.setHours(0, 0, 0, 0);
      const day = result.getDay();
      const daysUntilMonday = day === 0 ? 1 : 8 - day;
      result.setDate(result.getDate() + daysUntilMonday);
      return result;
    }

    function formatDateVN(dateValue) {
      const date = typeof dateValue === "string" ? parseDate(dateValue) : dateValue;
      return new Intl.DateTimeFormat("vi-VN", {
        weekday: "long",
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      }).format(date);
    }

    function getWeekRangeText(weekStart) {
      const start = parseDate(weekStart);
      const end = addDays(start, 6);
      return `${formatDateVN(start)} → ${formatDateVN(end)}`;
    }

    function taskBefore(taskName) {
      const index = TASKS.indexOf(taskName);
      if (index === -1) return TASKS[0];
      return TASKS[(index - 1 + TASKS.length) % TASKS.length];
    }

    function nextTaskAfter(taskName) {
      const index = TASKS.indexOf(taskName);
      if (index === -1) return TASKS[0];
      return TASKS[(index + 1) % TASKS.length];
    }

    function getPresentMembers() {
      return state.members.filter(member => attendance[member.id] !== false);
    }

    function getAbsentMembers() {
      return state.members.filter(member => attendance[member.id] === false);
    }

    function getPreviousSchedule(weekStart) {
      return state.schedules
        .filter(schedule => schedule.weekStart < weekStart)
        .sort((a, b) => b.weekStart.localeCompare(a.weekStart))[0] || null;
    }

    function getLastAssignmentOfMember(memberId, beforeWeekStart = null) {
      const schedules = [...state.schedules]
        .filter(schedule => !beforeWeekStart || schedule.weekStart < beforeWeekStart)
        .sort((a, b) => b.weekStart.localeCompare(a.weekStart));

      for (const schedule of schedules) {
        const found = schedule.assignments.find(item => item.personId === memberId && !item.cut);
        if (found) return found;
      }

      return null;
    }

    function getAllAssignmentsBefore(memberId, beforeWeekStart) {
      return state.schedules
        .filter(schedule => schedule.weekStart < beforeWeekStart)
        .flatMap(schedule => schedule.assignments.filter(item => item.personId === memberId && !item.cut));
    }

    function getTotalAssignmentsBefore(memberId, beforeWeekStart) {
      return getAllAssignmentsBefore(memberId, beforeWeekStart).length;
    }

    function getTaskCountBefore(memberId, taskName, beforeWeekStart) {
      return getAllAssignmentsBefore(memberId, beforeWeekStart).filter(item => item.task === taskName).length;
    }

    function getExtraDutyCountBefore(memberId, beforeWeekStart) {
      let extra = 0;

      state.schedules
        .filter(schedule => schedule.weekStart < beforeWeekStart)
        .forEach(schedule => {
          const count = schedule.assignments.filter(item => item.personId === memberId && !item.cut).length;
          if (count > 1) extra += count - 1;
        });

      return extra;
    }

    function getTasksForWeek(presentCount, absentCount) {
      let tasks = [...TASKS];
      const cutTasks = [];

      if (absentCount >= 2) {
        return {
          tasks,
          cutTasks,
          mode: "Vắng từ 2 người: giữ đủ việc, chia theo lịch sử việc phụ."
        };
      }

      while (tasks.length > presentCount && cutTasks.length < CUT_PRIORITY.length) {
        const taskToCut = CUT_PRIORITY[cutTasks.length];
        tasks = tasks.filter(task => task !== taskToCut);
        cutTasks.push(taskToCut);
      }

      return {
        tasks,
        cutTasks,
        mode: cutTasks.length ? "Có cắt việc phụ." : "Xoay tua đủ việc."
      };
    }

    function buildWorkCaps(presentMembers, taskCount, weekStart) {
      const base = Math.floor(taskCount / presentMembers.length);
      const extraSlots = taskCount % presentMembers.length;

      const ranked = [...presentMembers].sort((a, b) => {
        const extraA = getExtraDutyCountBefore(a.id, weekStart);
        const extraB = getExtraDutyCountBefore(b.id, weekStart);
        if (extraA !== extraB) return extraA - extraB;

        const totalA = getTotalAssignmentsBefore(a.id, weekStart);
        const totalB = getTotalAssignmentsBefore(b.id, weekStart);
        if (totalA !== totalB) return totalA - totalB;

        return a.name.localeCompare(b.name, "vi");
      });

      const caps = {};
      ranked.forEach((member, index) => {
        caps[member.id] = base + (index < extraSlots ? 1 : 0);
      });

      return caps;
    }

    function getIdealPersonForTask(taskName, previousSchedule, presentMap) {
      if (!previousSchedule) return null;

      const prevTask = taskBefore(taskName);
      const previousAssignment = previousSchedule.assignments.find(item => {
        return item.task === prevTask && !item.cut && item.personId;
      });

      if (!previousAssignment) return null;
      return presentMap.get(previousAssignment.personId) || null;
    }

    function chooseFallbackPerson(taskName, presentMembers, loads, caps, weekStart) {
      let candidates = presentMembers.filter(member => loads[member.id] < caps[member.id]);
      if (candidates.length === 0) candidates = presentMembers;

      return candidates
        .map(member => {
          const last = getLastAssignmentOfMember(member.id, weekStart);
          const expected = last ? nextTaskAfter(last.task) : TASKS[0];

          let score = 0;
          score += loads[member.id] * 1000;
          score += expected === taskName ? -180 : 0;
          score += getExtraDutyCountBefore(member.id, weekStart) * 60;
          score += getTaskCountBefore(member.id, taskName, weekStart) * 30;
          score += getTotalAssignmentsBefore(member.id, weekStart) * 8;
          score += member.name.localeCompare("zzzz", "vi") / 100000;

          return { member, score };
        })
        .sort((a, b) => a.score - b.score)[0].member;
    }

    function generateRotatingAssignments(weekStart, presentMembers, activeTasks) {
      const previousSchedule = getPreviousSchedule(weekStart);
      const presentMap = new Map(presentMembers.map(member => [member.id, member]));
      const caps = buildWorkCaps(presentMembers, activeTasks.length, weekStart);
      const loads = Object.fromEntries(presentMembers.map(member => [member.id, 0]));
      const assignments = [];

      activeTasks.forEach(task => {
        const ideal = getIdealPersonForTask(task, previousSchedule, presentMap);
        let picked = null;
        let note = "";

        if (ideal && loads[ideal.id] < caps[ideal.id]) {
          picked = ideal;
          note = `${taskBefore(task)} → ${task}`;
        } else {
          picked = chooseFallbackPerson(task, presentMembers, loads, caps, weekStart);
          note = ideal && ideal.id !== picked.id ? "Đổi để cân bằng số việc." : "";
        }

        loads[picked.id] += 1;

        assignments.push({
          task,
          personId: picked.id,
          personName: picked.name,
          cut: false,
          note
        });
      });

      return assignments;
    }

    function addCutAssignments(assignments, cutTasks) {
      cutTasks.forEach(task => {
        assignments.push({
          task,
          personId: null,
          personName: "Tạm cắt",
          cut: true,
          note: ""
        });
      });

      return assignments;
    }

    function upsertSchedule(schedule) {
      const index = state.schedules.findIndex(item => item.weekStart === schedule.weekStart);
      if (index >= 0) state.schedules[index] = schedule;
      else state.schedules.push(schedule);

      state.schedules.sort((a, b) => a.weekStart.localeCompare(b.weekStart));
      selectedScheduleId = schedule.id;
      saveState();
    }

    function generateSchedule() {
      const weekStart = $("#weekStart").value;
      if (!weekStart) return showToast("Chọn ngày bắt đầu tuần.");
      if (state.members.length === 0) return showToast("Thêm thành viên trước.");

      const presentMembers = getPresentMembers();
      const absentMembers = getAbsentMembers();

      if (presentMembers.length === 0) return showToast("Không thể tạo lịch khi tất cả đều vắng.");

      const existed = state.schedules.find(schedule => schedule.weekStart === weekStart);
      if (existed && !confirm("Tuần này đã có lịch. Ghi đè?")) return;

      const plan = getTasksForWeek(presentMembers.length, absentMembers.length);
      const assignments = addCutAssignments(
        generateRotatingAssignments(weekStart, presentMembers, plan.tasks),
        plan.cutTasks
      );

      upsertSchedule({
        id: existed ? existed.id : makeId(),
        weekStart,
        createdAt: existed ? existed.createdAt : new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        absentMemberIds: absentMembers.map(member => member.id),
        absentMemberNames: absentMembers.map(member => member.name),
        mode: plan.mode,
        source: "auto",
        assignments
      });

      showToast("Đã tạo lịch.");
      aiBotSay(buildAutoSuggestion());
    }

    function saveManualSchedule() {
      const weekStart = $("#weekStart").value;
      if (!weekStart) return showToast("Chọn ngày bắt đầu tuần.");
      if (state.members.length === 0) return showToast("Thêm thành viên trước.");

      const existed = state.schedules.find(schedule => schedule.weekStart === weekStart);
      if (existed && !confirm("Lưu chỉnh tay sẽ ghi đè lịch tuần này. Tiếp tục?")) return;

      const assignments = TASKS.map((task, index) => {
        const select = document.querySelector(`[data-task-index="${index}"]`);
        const value = select ? select.value : CUT_VALUE;

        if (value === CUT_VALUE) {
          return {
            task,
            personId: null,
            personName: "Tạm cắt",
            cut: true,
            note: ""
          };
        }

        const member = state.members.find(item => item.id === value);

        return {
          task,
          personId: member ? member.id : null,
          personName: member ? member.name : "Không rõ",
          cut: !member,
          note: ""
        };
      });

      const absentMembers = getAbsentMembers();

      upsertSchedule({
        id: existed ? existed.id : makeId(),
        weekStart,
        createdAt: existed ? existed.createdAt : new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        absentMemberIds: absentMembers.map(member => member.id),
        absentMemberNames: absentMembers.map(member => member.name),
        mode: "Phân công thủ công.",
        source: "manual",
        assignments
      });

      showToast("Đã lưu chỉnh tay.");
      aiBotSay("Đã lưu lịch chỉnh tay. Từ tuần sau, hệ thống sẽ lấy lịch này làm mốc xoay tua.");
    }

    function addMember() {
      const input = $("#memberName");
      const name = input.value.trim().replace(/\s+/g, " ");

      if (!name) return showToast("Tên không được rỗng.");

      const duplicated = state.members.some(member => member.name.toLowerCase() === name.toLowerCase());
      if (duplicated) return showToast("Tên này đã có.");

      const member = { id: makeId(), name, createdAt: new Date().toISOString() };
      state.members.push(member);
      attendance[member.id] = true;
      input.value = "";
      saveState();
      showToast("Đã thêm.");
    }

    function removeMember(id) {
      const member = state.members.find(item => item.id === id);
      if (!member) return;
      if (!confirm(`Xóa "${member.name}"?`)) return;

      state.members = state.members.filter(item => item.id !== id);
      delete attendance[id];
      saveState();
      showToast("Đã xóa.");
    }

    function setAttendance(id, present) {
      attendance[id] = present;
      renderStats();
      renderMembers();
      renderManualEditor();
    }

    function markAll(present) {
      state.members.forEach(member => attendance[member.id] = present);
      render();
      showToast(present ? "Đã đánh dấu có mặt." : "Đã đánh dấu vắng.");
    }

    function getTotalAssignmentsForMember(memberId) {
      return state.schedules.reduce((total, schedule) => {
        return total + schedule.assignments.filter(item => item.personId === memberId && !item.cut).length;
      }, 0);
    }

    function getCurrentSchedule() {
      if (!selectedScheduleId && state.schedules.length) {
        selectedScheduleId = state.schedules[state.schedules.length - 1].id;
      }

      return state.schedules.find(schedule => schedule.id === selectedScheduleId) || null;
    }

    function selectSchedule(id) {
      selectedScheduleId = id;
      const schedule = getCurrentSchedule();
      if (schedule) $("#weekStart").value = schedule.weekStart;
      renderCurrentSchedule();
      renderManualEditor();
      renderHistory();
    }

    function deleteCurrentSchedule() {
      const current = getCurrentSchedule();
      if (!current) return showToast("Chưa có lịch.");
      if (!confirm("Xóa lịch tuần đang xem?")) return;

      state.schedules = state.schedules.filter(schedule => schedule.id !== current.id);
      selectedScheduleId = state.schedules.length ? state.schedules[state.schedules.length - 1].id : null;
      saveState();
      showToast("Đã xóa.");
    }

    function clearAllData() {
      if (!confirm("Xóa toàn bộ dữ liệu?")) return;
      state = { members: [], schedules: [] };
      attendance = {};
      selectedScheduleId = null;
      saveState();
      showToast("Đã xóa toàn bộ.");
    }

    function makeScheduleText(schedule) {
      if (!schedule) return "";

      const lines = [];
      lines.push("LỊCH TRỰC NHẬT");
      lines.push(`Tuần: ${getWeekRangeText(schedule.weekStart)}`);
      lines.push(`Người vắng: ${schedule.absentMemberNames?.length ? schedule.absentMemberNames.join(", ") : "Không có"}`);
      lines.push("");
      schedule.assignments.forEach((item, index) => {
        lines.push(`${index + 1}. ${item.task}: ${item.personName}`);
      });

      return lines.join("\n");
    }

    function copyCurrentSchedule() {
      const schedule = getCurrentSchedule();
      if (!schedule) return showToast("Chưa có lịch để copy.");

      navigator.clipboard.writeText(makeScheduleText(schedule))
        .then(() => showToast("Đã copy lịch."))
        .catch(() => {
          const temp = document.createElement("textarea");
          temp.value = makeScheduleText(schedule);
          document.body.appendChild(temp);
          temp.select();
          document.execCommand("copy");
          document.body.removeChild(temp);
          showToast("Đã copy lịch.");
        });
    }

    function exportTxt() {
      const schedule = getCurrentSchedule();
      if (!schedule) return showToast("Chưa có lịch.");

      const blob = new Blob([makeScheduleText(schedule)], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `lich-truc-nhat-${schedule.weekStart}.txt`;
      a.click();
      URL.revokeObjectURL(url);
      showToast("Đã xuất TXT.");
    }

    function exportPdf() {
      const schedule = getCurrentSchedule();
      if (!schedule) return showToast("Chưa có lịch.");
      window.print();
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `du-lieu-truc-nhat-${toLocalDateInputValue(new Date())}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast("Đã xuất dữ liệu.");
    }

    function importData(file) {
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!Array.isArray(imported.members) || !Array.isArray(imported.schedules)) {
            throw new Error("Invalid format");
          }

          state = { members: imported.members, schedules: imported.schedules };
          attendance = {};
          initAttendanceFromMembers();
          selectedScheduleId = state.schedules.length ? state.schedules[state.schedules.length - 1].id : null;
          saveState();
          showToast("Đã nhập dữ liệu.");
        } catch {
          showToast("File không hợp lệ.");
        }
      };

      reader.readAsText(file);
    }

    function renderStats() {
      $("#totalMembers").textContent = state.members.length;
      $("#presentMembers").textContent = getPresentMembers().length;
      $("#totalSchedules").textContent = state.schedules.length;
    }

    function renderMembers() {
      const list = $("#memberList");

      if (state.members.length === 0) {
        list.innerHTML = `<div class="empty">Chưa có thành viên.</div>`;
        return;
      }

      list.innerHTML = state.members.map(member => {
        const present = attendance[member.id] !== false;
        const last = getLastAssignmentOfMember(member.id);
        const next = last ? nextTaskAfter(last.task) : TASKS[0];
        const extra = getExtraDutyCountBefore(member.id, "9999-12-31");

        return `
          <div class="member">
            <label class="switch">
              <input type="checkbox" ${present ? "checked" : ""} onchange="setAttendance('${member.id}', this.checked)" />
              <span class="slider"></span>
            </label>
            <div>
              <strong>${escapeHTML(member.name)}</strong>
              <small>${present ? "Có mặt" : "Vắng"} · ${getTotalAssignmentsForMember(member.id)} việc · phụ ${extra}<br/>Tiếp: ${escapeHTML(next)}</small>
            </div>
            <button class="btn-red" onclick="removeMember('${member.id}')">Xóa</button>
          </div>
        `;
      }).join("");
    }

    function renderCurrentSchedule() {
      const container = $("#currentSchedule");
      const schedule = getCurrentSchedule();

      if (!schedule) {
        container.innerHTML = `<div class="empty">Chưa có lịch. Chọn ngày rồi bấm <b>Tạo lịch</b>.</div>`;
        return;
      }

      const absentText = schedule.absentMemberNames?.length ? schedule.absentMemberNames.join(", ") : "Không có";
      const sourceText = schedule.source === "manual" ? "Chỉnh tay" : "Tự động";

      container.innerHTML = `
        <article class="schedule">
          <div class="schedule-title">
            <div>
              <h3>${getWeekRangeText(schedule.weekStart)}</h3>
              <p>Người vắng: ${escapeHTML(absentText)} · ${escapeHTML(schedule.mode || "")}</p>
            </div>
            <div class="schedule-actions">
              <button class="btn-blue" onclick="copyCurrentSchedule()">Copy</button>
              <span class="tag">${escapeHTML(sourceText)}</span>
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th>Nhiệm vụ</th>
                <th>Người phụ trách</th>
              </tr>
            </thead>
            <tbody>
              ${schedule.assignments.map(item => `
                <tr class="${item.cut ? "cut" : ""}">
                  <td>${escapeHTML(item.task)}</td>
                  <td>
                    ${escapeHTML(item.personName)}
                    ${item.note ? `<div class="note">${escapeHTML(item.note)}</div>` : ""}
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </article>
      `;
    }

    function renderManualEditor() {
      const editor = $("#manualEditor");
      const schedule = getCurrentSchedule();

      const values = {};
      if (schedule) {
        schedule.assignments.forEach(item => values[item.task] = item.cut ? CUT_VALUE : item.personId);
      }

      editor.innerHTML = TASKS.map((task, index) => {
        const selectedValue = values[task] || CUT_VALUE;

        return `
          <div class="manual-item">
            <label>${escapeHTML(task)}</label>
            <select data-task-index="${index}">
              <option value="${CUT_VALUE}" ${selectedValue === CUT_VALUE ? "selected" : ""}>Tạm cắt</option>
              ${state.members.map(member => {
                const status = attendance[member.id] === false ? " - vắng" : "";
                const selected = selectedValue === member.id ? "selected" : "";
                return `<option value="${member.id}" ${selected}>${escapeHTML(member.name + status)}</option>`;
              }).join("")}
            </select>
          </div>
        `;
      }).join("");
    }

    function renderHistory() {
      const history = $("#history");

      if (state.schedules.length === 0) {
        history.innerHTML = `<div class="empty">Chưa có lịch sử.</div>`;
        return;
      }

      const schedules = [...state.schedules].sort((a, b) => b.weekStart.localeCompare(a.weekStart));

      history.innerHTML = schedules.map(schedule => `
        <details ${schedule.id === selectedScheduleId ? "open" : ""}>
          <summary onclick="selectSchedule('${schedule.id}')">
            <span>${getWeekRangeText(schedule.weekStart)}</span>
            <span>${schedule.source === "manual" ? "Chỉnh tay" : "Tự động"}</span>
          </summary>
          <table>
            <tbody>
              ${schedule.assignments.map(item => `
                <tr>
                  <td>${escapeHTML(item.task)}</td>
                  <td><b>${escapeHTML(item.personName)}</b></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </details>
      `).join("");
    }

    function addAIMessage(role, text) {
      const box = $("#aiMessages");
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function aiBotSay(text) {
      addAIMessage("bot", text);
    }

    function aiUserSay(text) {
      addAIMessage("user", text);
    }

    function getAIBasicContext() {
      const present = getPresentMembers();
      const absent = getAbsentMembers();
      const weekStart = $("#weekStart").value;
      const plan = getTasksForWeek(present.length, absent.length);
      const schedule = getCurrentSchedule();
      const previousSchedule = weekStart ? getPreviousSchedule(weekStart) : null;

      return { present, absent, weekStart, plan, schedule, previousSchedule };
    }

    function getCurrentWeekLoads(schedule = getCurrentSchedule()) {
      const loads = {};
      state.members.forEach(member => {
        loads[member.id] = {
          id: member.id,
          name: member.name,
          count: 0,
          tasks: [],
          cut: 0,
          extraHistory: getExtraDutyCountBefore(member.id, "9999-12-31"),
          totalHistory: getTotalAssignmentsForMember(member.id)
        };
      });

      if (!schedule) return loads;

      schedule.assignments.forEach(item => {
        if (!item.personId || item.cut || !loads[item.personId]) return;
        loads[item.personId].count += 1;
        loads[item.personId].tasks.push(item.task);
      });

      return loads;
    }

    function getTaskWeight(task) {
      const weights = {
        "Lavabo - Toilet": 5,
        "Sàn nvs - cống": 5,
        "Quét Nhà": 3,
        "Lau Nhà": 4,
        "Giặt thảm": 2,
        "Vứt rác, bình nước": 2
      };

      return weights[task] || 3;
    }

    function getTaskPriorityText() {
      return [
        "Mức ưu tiên công việc:",
        "1. Lavabo - Toilet: rất quan trọng, không nên cắt.",
        "2. Sàn nvs - cống: rất quan trọng, không nên cắt.",
        "3. Lau Nhà: nên giữ nếu còn đủ người.",
        "4. Quét Nhà: nên giữ nếu còn đủ người.",
        "5. Giặt thảm: có thể cắt khi thiếu người nhẹ.",
        "6. Vứt rác, bình nước: có thể cắt đầu tiên nếu thiếu người nhẹ.",
        "",
        "Khi thiếu người nhẹ, thứ tự cắt hợp lý là: Vứt rác, bình nước → Giặt thảm."
      ].join("\n");
    }

    function getWeekLoadSummary(schedule = getCurrentSchedule()) {
      const loads = Object.values(getCurrentWeekLoads(schedule))
        .filter(item => item.count > 0)
        .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name, "vi"));

      if (!loads.length) return "Chưa có dữ liệu phân công trong tuần này.";

      return loads.map(item => {
        return `- ${item.name}: ${item.count} việc (${item.tasks.join(", ")})`;
      }).join("\n");
    }

    function buildAutoSuggestion() {
      const { present, absent, plan, schedule, weekStart } = getAIBasicContext();

      if (state.members.length === 0) {
        return "Bạn chưa thêm thành viên. Hãy thêm người trong phòng trước, sau đó mình mới gợi ý lịch được.";
      }

      if (present.length === 0) {
        return "Tất cả đang bị đánh dấu vắng nên chưa thể tạo lịch. Cần ít nhất 1 người có mặt.";
      }

      let text = "";
      text += `Hiện có ${present.length}/${state.members.length} người có mặt. `;

      if (absent.length) {
        text += `Người vắng: ${absent.map(m => m.name).join(", ")}.\n`;
      } else {
        text += "Không có người vắng.\n";
      }

      if (absent.length >= 2) {
        const caps = buildWorkCaps(present, TASKS.length, weekStart || "9999-12-31");
        const capText = present.map(member => `${member.name}: ${caps[member.id]} việc`).join(", ");
        text += `Phương án tối ưu: giữ đủ 6 nhiệm vụ, nhưng chia suất việc theo lịch sử để người từng gánh ít việc phụ được nhận thêm trước.\nSuất đề xuất: ${capText}.`;
      } else if (plan.cutTasks.length) {
        text += `Phương án tối ưu: cắt tạm ${plan.cutTasks.join(", ")} vì đây là nhóm việc phụ.`;
      } else {
        text += "Phương án tối ưu: chia xoay tua đủ 6 nhiệm vụ.";
      }

      if (schedule) {
        text += "\n\nLịch hiện tại:\n" + getWeekLoadSummary(schedule);
        text += "\n\nBạn có thể bấm “Copy lịch” để gửi nhanh.";
      } else {
        text += "\n\nBấm “Tạo lịch” để hệ thống chia tự động, hoặc mở “Chỉnh tay phân công” để tự chọn người.";
      }

      return text;
    }

    function analyzeFairness() {
      const { schedule, present, weekStart } = getAIBasicContext();

      if (!schedule) {
        return "Chưa có lịch để phân tích. Hãy tạo lịch hoặc lưu chỉnh tay trước.";
      }

      const loads = Object.values(getCurrentWeekLoads(schedule))
        .filter(item => present.some(member => member.id === item.id));

      if (!loads.length) {
        return "Lịch hiện tại chưa có ai được phân công.";
      }

      const counts = loads.map(item => item.count);
      const max = Math.max(...counts);
      const min = Math.min(...counts);
      const heavy = loads.filter(item => item.count === max && max > min);
      const light = loads.filter(item => item.count === min && max > min);

      let text = "Phân tích công bằng tuần này:\n";
      text += loads
        .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name, "vi"))
        .map(item => `- ${item.name}: ${item.count} việc, đã gánh việc phụ ${item.extraHistory} lần`)
        .join("\n");

      if (max - min <= 1) {
        text += "\n\nKết luận: số lượng việc đang khá công bằng vì chênh lệch tối đa chỉ 1 việc.";
      } else {
        text += `\n\nKết luận: đang lệch. ${heavy.map(x => x.name).join(", ")} đang nhiều việc hơn ${light.map(x => x.name).join(", ")}.`;
      }

      const caps = buildWorkCaps(present, schedule.assignments.filter(item => !item.cut).length, weekStart || "9999-12-31");
      const capText = present.map(member => `${member.name}: nên khoảng ${caps[member.id]} việc`).join(", ");
      text += `\nSuất hợp lý theo lịch sử: ${capText}.`;

      return text;
    }

    function suggestSwap() {
      const { schedule, present } = getAIBasicContext();

      if (!schedule) {
        return "Chưa có lịch để gợi ý đổi người.";
      }

      const loads = Object.values(getCurrentWeekLoads(schedule))
        .filter(item => present.some(member => member.id === item.id));

      if (!loads.length) {
        return "Lịch hiện tại chưa có phân công.";
      }

      const sorted = [...loads].sort((a, b) => b.count - a.count || b.extraHistory - a.extraHistory);
      const heavy = sorted[0];
      const light = [...loads].sort((a, b) => a.count - b.count || a.extraHistory - b.extraHistory)[0];

      if (!heavy || !light || heavy.count - light.count <= 1) {
        const mostRepeated = findRepeatedTaskSuggestion(schedule);
        if (mostRepeated) return mostRepeated;
        return "Lịch hiện tại đã khá cân bằng. Chưa cần đổi người.";
      }

      const heavyTasks = schedule.assignments
        .filter(item => item.personId === heavy.id && !item.cut)
        .sort((a, b) => getTaskWeight(a.task) - getTaskWeight(b.task));

      const taskToMove = heavyTasks[0];

      if (!taskToMove) return "Chưa tìm được nhiệm vụ phù hợp để đổi.";

      return [
        "Gợi ý đổi để cân bằng:",
        `- Chuyển “${taskToMove.task}” từ ${heavy.name} sang ${light.name}.`,
        `- Lý do: ${heavy.name} đang có ${heavy.count} việc, còn ${light.name} có ${light.count} việc.`,
        "- Nên ưu tiên đổi việc nhẹ trước để không phá vòng xoay quá nhiều."
      ].join("\n");
    }

    function findRepeatedTaskSuggestion(schedule) {
      for (const item of schedule.assignments) {
        if (!item.personId || item.cut) continue;

        const last = getLastAssignmentOfMember(item.personId, schedule.weekStart);
        if (last && last.task === item.task) {
          const person = state.members.find(member => member.id === item.personId);
          return [
            "Có một điểm có thể tối ưu:",
            `- ${person ? person.name : item.personName} bị lặp lại nhiệm vụ “${item.task}”.`,
            "- Nếu có người khác đang ít việc hơn, nên đổi nhiệm vụ này để xoay tua đều hơn."
          ].join("\n");
        }
      }

      return null;
    }

    function explainWhySchedule() {
      const { schedule } = getAIBasicContext();

      if (!schedule) {
        return "Chưa có lịch để giải thích. Hãy tạo lịch trước.";
      }

      const lines = [];
      lines.push("Vì sao lịch được chia như vậy:");

      if (schedule.source === "manual") {
        lines.push("- Lịch này do bạn chỉnh tay, nên hệ thống xem nó là mốc chính để xoay tua cho tuần sau.");
      } else {
        lines.push("- Hệ thống dựa vào lịch tuần trước: ai làm việc nào thì tuần này được đẩy xuống việc kế tiếp.");
      }

      lines.push("- Nếu người theo vòng xoay bị vắng hoặc đã đủ số việc, hệ thống chuyển việc sang người có ít việc hơn.");
      lines.push("- Khi vắng từ 2 người, hệ thống giữ đủ việc nhưng xoay phần việc dư cho người từng gánh phụ ít hơn.");
      lines.push("");
      lines.push("Tóm tắt lịch hiện tại:");
      lines.push(getWeekLoadSummary(schedule));

      return lines.join("\n");
    }

    function explainMissingPeople() {
      const { present, absent, plan, weekStart } = getAIBasicContext();

      if (state.members.length === 0) {
        return "Chưa có dữ liệu thành viên nên mình chưa thể tính phương án thiếu người.";
      }

      if (absent.length === 0) {
        return "Tuần này chưa có ai vắng. Cứ xoay tua đủ việc là hợp lý nhất.";
      }

      if (present.length === 0) {
        return "Không có ai có mặt nên không thể phân công.";
      }

      if (absent.length === 1) {
        return [
          "Vắng 1 người:",
          `- Nên cắt tạm: ${CUT_PRIORITY[0]}.`,
          "- Nếu phòng vẫn cần đủ việc, có thể giữ đủ 6 việc và giao thêm 1 việc nhẹ cho người có ít việc phụ nhất.",
          "- Không nên cắt Lavabo - Toilet hoặc Sàn nvs - cống vì đây là việc quan trọng."
        ].join("\n");
      }

      const caps = buildWorkCaps(present, TASKS.length, weekStart || "9999-12-31");
      const capText = present.map(member => `- ${member.name}: ${caps[member.id]} việc`).join("\n");

      return [
        `Vắng ${absent.length} người:`,
        "Không nên cắt quá nhiều vì phòng vẫn cần đủ vệ sinh cơ bản.",
        "Phương án công bằng nhất là giữ đủ 6 nhiệm vụ rồi chia suất việc theo lịch sử:",
        capText,
        "",
        "Người từng nhận ít việc phụ hơn sẽ được nhận thêm trước. Tuần sau phần việc dư sẽ xoay sang người khác."
      ].join("\n");
    }

    function explainPriority() {
      return getTaskPriorityText();
    }

    function explainNextWeek() {
      return "Nút “Chọn tuần sau” chỉ tự điền ngày bắt đầu của tuần kế tiếp, thường là thứ Hai. Nó không tạo lịch ngay. Sau khi bấm nút này, hãy bấm “Tạo lịch” để sinh lịch cho tuần sau.";
    }

    function answerAIQuestion(question) {
      const q = question.toLowerCase();

      if (q.includes("tuần sau") || q.includes("tuần tiếp") || q.includes("next")) {
        return explainNextWeek();
      }

      if (q.includes("công bằng") || q.includes("cân bằng") || q.includes("lệch") || q.includes("đều")) {
        return analyzeFairness();
      }

      if (q.includes("đổi") || q.includes("swap") || q.includes("chuyển")) {
        return suggestSwap();
      }

      if (q.includes("vì sao") || q.includes("tại sao") || q.includes("giải thích")) {
        return explainWhySchedule();
      }

      if (q.includes("thiếu") || q.includes("vắng") || q.includes("nghỉ")) {
        return explainMissingPeople();
      }

      if (q.includes("ưu tiên") || q.includes("công việc") || q.includes("cắt")) {
        return explainPriority();
      }

      if (q.includes("copy") || q.includes("sao chép")) {
        return "Bấm nút “Copy lịch” ở đầu khung phân công hoặc nút “Copy” ngay trên lịch. Nội dung sẽ được đưa vào clipboard để gửi Zalo/Messenger.";
      }

      if (q.includes("gợi ý") || q.includes("lịch") || q.includes("chia") || q.includes("phân")) {
        return buildAutoSuggestion();
      }

      return [
        "Mình có thể hỗ trợ:",
        "- Gợi ý lịch tuần này.",
        "- Phân tích lịch có công bằng không.",
        "- Gợi ý đổi người để đỡ lệch.",
        "- Giải thích vì sao chia như vậy.",
        "- Tư vấn khi thiếu/vắng người.",
        "- Ưu tiên công việc nào nên giữ hoặc cắt."
      ].join("\n");
    }

    function sendAIMessage(text = null) {
      const input = $("#aiInput");
      const message = (text || input.value).trim();
      if (!message) return;

      aiUserSay(message);
      input.value = "";

      setTimeout(() => {
        aiBotSay(answerAIQuestion(message));
      }, 180);
    }

    function render() {
      initAttendanceFromMembers();
      renderStats();
      renderMembers();
      renderCurrentSchedule();
      renderManualEditor();
      renderHistory();
    }

    $("#addMemberBtn").addEventListener("click", addMember);
    $("#memberName").addEventListener("keydown", event => {
      if (event.key === "Enter") addMember();
    });

    $("#nextWeekBtn").addEventListener("click", () => {
      $("#weekStart").value = toLocalDateInputValue(getNextMonday());
      selectedScheduleId = null;
      renderCurrentSchedule();
      renderManualEditor();
      renderHistory();
      showToast("Đã chọn tuần sau.");
      aiBotSay(explainNextWeek());
    });

    $("#weekStart").addEventListener("change", () => {
      const matched = state.schedules.find(schedule => schedule.weekStart === $("#weekStart").value);
      selectedScheduleId = matched ? matched.id : null;
      renderCurrentSchedule();
      renderManualEditor();
      renderHistory();
    });

    $("#generateBtn").addEventListener("click", generateSchedule);
    $("#saveManualBtn").addEventListener("click", saveManualSchedule);
    $("#copyBtn").addEventListener("click", copyCurrentSchedule);
    $("#exportTxtBtn").addEventListener("click", exportTxt);
    $("#exportPdfBtn").addEventListener("click", exportPdf);
    $("#deleteCurrentBtn").addEventListener("click", deleteCurrentSchedule);
    $("#markAllPresentBtn").addEventListener("click", () => markAll(true));
    $("#markAllAbsentBtn").addEventListener("click", () => markAll(false));
    $("#clearBtn").addEventListener("click", clearAllData);
    $("#exportDataBtn").addEventListener("click", exportData);
    $("#importDataBtn").addEventListener("click", () => $("#importFile").click());
    $("#importFile").addEventListener("change", event => {
      importData(event.target.files[0]);
      event.target.value = "";
    });

    $("#aiAnalyzeBtn").addEventListener("click", () => aiBotSay(buildAutoSuggestion()));
    $("#aiSendBtn").addEventListener("click", () => sendAIMessage());
    $("#aiInput").addEventListener("keydown", event => {
      if (event.key === "Enter") sendAIMessage();
    });

    document.querySelectorAll("[data-ai]").forEach(button => {
      button.addEventListener("click", () => sendAIMessage(button.dataset.ai));
    });

    $("#weekStart").value = toLocalDateInputValue(getNextMonday());
    render();
    aiBotSay("Mình là trợ lý trực nhật. Mình có thể phân tích công bằng, gợi ý đổi người, giải thích vì sao chia như vậy, và tư vấn khi thiếu người.");
  </script>
</body>
</html>
